name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Formatting, Vet, and Modules
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOCACHE: /tmp/gocache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Check module files
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOCACHE: /tmp/gocache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run unit tests
        run: |
          packages=$(go list ./... | grep -v '/test$')
          if [ -z "$packages" ]; then
            echo "No package to test."
            exit 0
          fi
          go test $packages -count=1 -shuffle=on -timeout=8m

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOCACHE: /tmp/gocache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: go test ./test -run '^TestAppIntegration_' -count=1 -shuffle=on -timeout=8m

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GOCACHE: /tmp/gocache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run real-network E2E tests
        run: go test ./test -run '^TestAppE2E_' -count=1 -timeout=8m

  race:
    name: Race Detector
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOCACHE: /tmp/gocache
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Download dependencies
        run: go mod download

      - name: Run race detector
        run: go test -race ./... -count=1 -shuffle=on -timeout=12m
